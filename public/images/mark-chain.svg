<svg width="100%" viewBox="0 0 400 220" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="glow-soft" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="5" result="b1"/>
      <feGaussianBlur in="SourceGraphic" stdDeviation="2" result="b2"/>
      <feMerge><feMergeNode in="b1"/><feMergeNode in="b2"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-hard" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="10" result="b1"/>
      <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="b2"/>
      <feMerge><feMergeNode in="b1"/><feMergeNode in="b2"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="400" height="220" rx="10" fill="#0c1014"/>
  <line x1="75" y1="110" x2="138" y2="110" stroke="#D45769" stroke-width="1.8" stroke-linecap="round" opacity="0.6" filter="url(#glow-soft)"/>
  <line x1="166" y1="110" x2="232" y2="110" stroke="#3dbfcf" stroke-width="1.8" stroke-linecap="round" opacity="0.7" filter="url(#glow-soft)"/>
  <line x1="260" y1="110" x2="326" y2="110" stroke="#3dbfcf" stroke-width="2" stroke-linecap="round" filter="url(#glow-soft)"/>
  <circle cx="62" cy="110" r="12" fill="#D45769" opacity="0.8" filter="url(#glow-soft)"/>
  <circle cx="62" cy="110" r="6" fill="#f08090" opacity="0.9"/>
  <circle cx="152" cy="110" r="12" fill="#2a9aaa" opacity="0.55" filter="url(#glow-soft)"/>
  <circle cx="152" cy="110" r="6" fill="#3dbfcf" opacity="0.8"/>
  <circle cx="246" cy="110" r="13" fill="#2a9aaa" opacity="0.75" filter="url(#glow-soft)"/>
  <circle cx="246" cy="110" r="7" fill="#5ee8f5" opacity="0.85"/>
  <circle cx="340" cy="110" r="15" fill="#2a9aaa" filter="url(#glow-hard)"/>
  <circle cx="340" cy="110" r="8" fill="#6de8f5" opacity="0.9"/>
</svg>
